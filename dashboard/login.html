<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Mirakl SAV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f1629;
      color: #e2e8f0;
      overflow: hidden;
    }

    .bg-dot {
      position: fixed;
      pointer-events: none;
      border-radius: 999px;
      filter: blur(2px);
    }
    .bg-dot.top {
      top: -220px;
      right: -220px;
      width: 620px;
      height: 620px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.16) 0%, transparent 70%);
    }
    .bg-dot.bottom {
      left: -180px;
      bottom: -180px;
      width: 460px;
      height: 460px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.14) 0%, transparent 70%);
    }

    .wrap {
      height: 100%;
      display: flex;
      position: relative;
      z-index: 1;
    }

    .left {
      flex: 1;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 520px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 56px;
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #3b82f6;
      color: #fff;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .brand-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .brand-sub {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    h1 {
      font-size: 38px;
      line-height: 1.18;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
    }
    h1 span {
      background: linear-gradient(90deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }
    .intro {
      max-width: 520px;
      color: #64748b;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 34px;
    }

    .quick-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 520px;
    }
    .quick {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: inherit;
      padding: 14px 16px;
      text-align: left;
      display: flex;
      gap: 12px;
      align-items: center;
      cursor: pointer;
      transition: all .16s ease;
    }
    .quick:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(139, 92, 246, 0.35);
    }
    .quick-avatar {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .quick-avatar.vendeur { background: rgba(59, 130, 246, 0.16); color: #93c5fd; }
    .quick-avatar.mp { background: rgba(139, 92, 246, 0.16); color: #c4b5fd; }
    .quick-main { flex: 1; }
    .quick-title { font-size: 12px; font-weight: 700; color: #e2e8f0; }
    .quick-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
    .quick-sub code { font-family: 'DM Mono', monospace; color: #94a3b8; }
    .quick-arrow { color: #60a5fa; font-weight: 700; font-size: 12px; }

    .right {
      width: 460px;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      background: #fff;
      border-radius: 20px;
      padding: 36px 40px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      color: #0f172a;
    }
    .card-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color .16s ease;
    }
    .field input:focus { border-color: #3b82f6; }

    .pwd-wrap { position: relative; }
    .pwd-toggle {
      position: absolute;
      right: 10px;
      top: 35px;
      border: none;
      background: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
    }

    .error {
      display: none;
      margin-top: 6px;
      font-size: 11px;
      color: #ef4444;
    }
    .error.show { display: block; }

    .submit {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px;
      background: #3b82f6;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .16s ease, opacity .16s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .submit:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      cursor: not-allowed;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    .quick-actions {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .quick-actions .label {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 2px;
    }
    .quick-btn {
      border: 1px solid #f1f5f9;
      background: #f8fafc;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #475569;
      transition: background .16s ease;
    }
    .quick-btn:hover { background: #f1f5f9; }
    .quick-btn strong { font-size: 11px; font-weight: 700; }
    .quick-btn code { font-family: 'DM Mono', monospace; color: #94a3b8; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1080px) {
      body { overflow: auto; }
      .wrap { flex-direction: column; min-height: 100%; }
      .left { min-width: auto; padding: 36px 24px 10px; }
      .right { width: 100%; padding: 16px 24px 36px; }
      h1 { font-size: 30px; }
      .intro { margin-bottom: 18px; }
    }
  </style>
</head>
<body>
  <div class="bg-dot top"></div>
  <div class="bg-dot bottom"></div>

  <div class="wrap">
    <section class="left">
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <div class="brand-title">Mirakl SAV</div>
          <div class="brand-sub">Plateforme de gestion SAV</div>
        </div>
      </div>

      <h1>Gérez votre SAV<br><span>avec l'IA.</span></h1>
      <p class="intro">
        Déléguez vos opérations SAV à un agent IA autonome. Répondez aux clients, gérez les retours et suivez vos performances.
      </p>

      <div class="quick-list">
        <button class="quick" type="button" data-role="vendeur">
          <div class="quick-avatar vendeur">F</div>
          <div class="quick-main">
            <div class="quick-title">Vendeur</div>
            <div class="quick-sub">boutique@fanny.fr · <code>vendeur123</code></div>
          </div>
          <span class="quick-arrow">→</span>
        </button>
        <button class="quick" type="button" data-role="marketplace">
          <div class="quick-avatar mp">M</div>
          <div class="quick-main">
            <div class="quick-title">Opérateur Marketplace</div>
            <div class="quick-sub">ops@mirakl.com · <code>market123</code></div>
          </div>
          <span class="quick-arrow">→</span>
        </button>
      </div>
    </section>

    <aside class="right">
      <div class="card">
        <div class="card-title">Connexion</div>
        <div class="card-sub">Accédez à votre espace</div>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="votre@email.com" autocomplete="email" required />
          </div>

          <div class="field pwd-wrap">
            <label for="password">Mot de passe</label>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            <button class="pwd-toggle" id="pwd-toggle" type="button">👁</button>
            <div id="error" class="error">Email ou mot de passe incorrect.</div>
          </div>

          <button id="submit" class="submit" type="submit">Se connecter →</button>
        </form>

        <div class="quick-actions">
          <div class="label">Accès rapide (démo)</div>
          <button type="button" class="quick-btn" data-quick="vendeur">
            <strong>Vendeur</strong><code>boutique@fanny.fr</code>
          </button>
          <button type="button" class="quick-btn" data-quick="marketplace">
            <strong>Marketplace</strong><code>ops@mirakl.com</code>
          </button>
        </div>
      </div>
    </aside>
  </div>

  <script>
    (function () {
      const USERS = {
        vendeur: { role: 'vendeur', email: 'boutique@fanny.fr', password: 'vendeur123' },
        marketplace: { role: 'marketplace', email: 'ops@mirakl.com', password: 'market123' }
      };

      const emailEl = document.getElementById('email');
      const pwdEl = document.getElementById('password');
      const errorEl = document.getElementById('error');
      const formEl = document.getElementById('login-form');
      const submitEl = document.getElementById('submit');
      const toggleEl = document.getElementById('pwd-toggle');
      let loading = false;

      function pick(role) {
        const u = USERS[role];
        if (!u) return;
        emailEl.value = u.email;
        pwdEl.value = u.password;
        errorEl.classList.remove('show');
      }

      function setLoading(state) {
        loading = state;
        submitEl.disabled = state;
        submitEl.innerHTML = state ? '<span class="spinner"></span> Connexion...' : 'Se connecter →';
      }

      function doLogin(user) {
        try {
          const savedRaw = localStorage.getItem('mirakl-sav-state');
          const saved = savedRaw ? JSON.parse(savedRaw) : {};
          const roleConfig = user.role === 'marketplace'
            ? { id: 'mp', role: 'marketplace', label: 'Opérateur Marketplace', email: user.email, avatar: 'M' }
            : { id: 'vendeur', role: 'vendeur', label: 'Vendeur', email: user.email, avatar: 'F' };

          localStorage.setItem('mirakl_sav_role', user.role);
          localStorage.setItem('mirakl_sav_email', user.email);
          localStorage.setItem('mirakl_sav_authenticated', 'true');
          localStorage.setItem('mirakl-sav-state', JSON.stringify({
            ...saved,
            user: roleConfig,
            page: user.role === 'marketplace' ? 'marketplace' : 'home'
          }));
        } catch (_) {}

        window.location.href = 'index.html';
      }

      document.querySelectorAll('.quick[data-role]').forEach((btn) => {
        btn.addEventListener('click', () => pick(btn.dataset.role));
      });
      document.querySelectorAll('.quick-btn[data-quick]').forEach((btn) => {
        btn.addEventListener('click', () => pick(btn.dataset.quick));
      });

      toggleEl.addEventListener('click', () => {
        const show = pwdEl.type === 'password';
        pwdEl.type = show ? 'text' : 'password';
        toggleEl.textContent = show ? '🙈' : '👁';
      });

      formEl.addEventListener('submit', (e) => {
        e.preventDefault();
        if (loading) return;

        errorEl.classList.remove('show');
        const email = emailEl.value.trim();
        const password = pwdEl.value;

        const user = Object.values(USERS).find((u) => u.email === email && u.password === password);
        if (!user) {
          errorEl.classList.add('show');
          return;
        }

        setLoading(true);
        setTimeout(() => doLogin(user), 500);
      });
    })();
  </script>
</body>
</html>
