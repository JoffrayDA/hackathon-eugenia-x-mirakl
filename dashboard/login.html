<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connexion — Mirakl SAV</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; }
  body {
    background: linear-gradient(135deg, #f1f5f9 0%, #e0e7ff 100%);
    color: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .card {
    width: 100%;
    max-width: 440px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px -20px rgba(15, 23, 42, .25), 0 4px 12px -4px rgba(15, 23, 42, .08);
    padding: 40px 36px;
    animation: fadeIn .4s ease-out;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .brand-logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 16px;
  }
  .brand-name {
    font-size: 15px; font-weight: 600; color: #0f172a;
  }
  .brand-sub {
    font-size: 12px; color: #64748b; font-weight: 500;
  }

  h1 {
    font-size: 24px; font-weight: 700; color: #0f172a; margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px; color: #64748b; margin-bottom: 28px;
  }

  .role-label {
    display: block;
    font-size: 12px; font-weight: 600;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 10px;
  }

  .role-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  .role-btn {
    border: 1.5px solid #e2e8f0;
    background: #f8fafc;
    border-radius: 12px;
    padding: 14px 12px;
    cursor: pointer;
    text-align: left;
    transition: all .15s ease;
    display: flex; flex-direction: column; gap: 4px;
  }
  .role-btn:hover { border-color: #cbd5e1; background: #fff; }
  .role-btn.active {
    border-color: #3b82f6;
    background: #eff6ff;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, .12);
  }
  .role-btn .role-title {
    font-size: 14px; font-weight: 600; color: #0f172a;
    display: flex; align-items: center; gap: 8px;
  }
  .role-btn.active .role-title { color: #1d4ed8; }
  .role-btn .role-desc {
    font-size: 12px; color: #64748b; line-height: 1.4;
  }
  .role-ico {
    width: 18px; height: 18px; color: #64748b;
  }
  .role-btn.active .role-ico { color: #3b82f6; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px; font-weight: 600;
    color: #475569;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    color: #0f172a;
    background: #fff;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, .12);
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 6px 0 22px;
    font-size: 13px;
  }
  .row label { color: #475569; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .row a { color: #3b82f6; text-decoration: none; font-weight: 500; }
  .row a:hover { text-decoration: underline; }

  .submit {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #0f172a;
    color: #fff;
    font-family: inherit;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: background .15s ease, transform .05s ease;
  }
  .submit:hover { background: #1e293b; }
  .submit:active { transform: translateY(1px); }
  .submit:disabled { background: #94a3b8; cursor: not-allowed; }

  .footer {
    margin-top: 20px;
    text-align: center;
    font-size: 13px;
    color: #64748b;
  }
  .footer a { color: #3b82f6; text-decoration: none; font-weight: 500; }
  .footer a:hover { text-decoration: underline; }

  .error {
    margin-bottom: 16px;
    padding: 10px 12px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px;
    color: #b91c1c;
    font-size: 13px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-logo">M</div>
      <div>
        <div class="brand-name">Mirakl SAV</div>
        <div class="brand-sub">Powered by Eugenia</div>
      </div>
    </div>

    <h1>Connexion</h1>
    <p class="subtitle">Choisissez votre espace pour continuer</p>

    <span class="role-label">Je suis</span>
    <div class="role-toggle" role="tablist">
      <button type="button" class="role-btn active" data-role="vendeur" role="tab" aria-selected="true">
        <span class="role-title">
          <svg class="role-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4"/><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
          Vendeur
        </span>
        <span class="role-desc">Gérez vos tickets SAV et vos commandes</span>
      </button>
      <button type="button" class="role-btn" data-role="marketplace" role="tab" aria-selected="false">
        <span class="role-title">
          <svg class="role-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
          Marketplace
        </span>
        <span class="role-desc">Supervisez vendeurs, litiges et flux</span>
      </button>
    </div>

    <form id="login-form" novalidate>
      <div class="error" id="error">Email ou mot de passe invalide.</div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="vous@exemple.com" required />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>

      <div class="row">
        <label><input type="checkbox" id="remember" /> Se souvenir de moi</label>
        <a href="#">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="submit" id="submit">Se connecter</button>
    </form>

    <p class="footer">Pas encore de compte ? <a href="#">Créer un compte</a></p>
  </div>

<script>
  (function () {
    let role = 'vendeur';
    const btns = document.querySelectorAll('.role-btn');
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        role = btn.dataset.role;
      });
    });

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Veuillez remplir tous les champs.';
        errorEl.classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Connexion…';

      try {
        localStorage.setItem('mirakl_sav_role', role);
        localStorage.setItem('mirakl_sav_email', email);
      } catch (_) {}

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 400);
    });
  })();
</script>
</body>
</html>
